<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kansai Trip App - Project 2</title>
  <meta name="description" content="Project 2: Kansai Trip App เวอร์ชัน modular สำหรับ hackathon">
  <meta name="theme-color" content="#b8342f">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Project 2 / Hackathon Build</p>
        <h1>Kansai Trip App 2026</h1>
        <p class="subtle">เวอร์ชันใหม่แบบหลายไฟล์, local-first, และเน้นใช้ระหว่างเดินทางจริง</p>
      </div>
      <div class="topbar-actions">
        <label class="search-chip trip-chip">
          <span>ทริปที่กำลังใช้งาน</span>
          <select id="trip-select" class="field"></select>
        </label>
        <label class="search-chip">
          <span>ค้นหา</span>
          <input id="global-search" type="search" placeholder="สถานที่, เมือง, ของกิน, pass...">
        </label>
        <button id="trip-new-btn" class="secondary-btn" type="button">New Trip</button>
        <button id="theme-toggle" class="ghost-btn" type="button">Dark</button>
      </div>
    </header>

    <section class="hero-strip">
      <div>
        <p class="hero-kicker">Kansai 20-26 Nov 2026</p>
        <h2>Dashboard + Today View + Import/Export + Modular Architecture</h2>
      </div>
      <div class="hero-badges" id="hero-badges"></div>
    </section>

    <nav class="nav-tabs" id="primary-nav">
      <button class="nav-tab active" data-view="dashboard" type="button">Dashboard</button>
      <button class="nav-tab" data-view="assist" type="button">Assist</button>
      <button class="nav-tab" data-view="prep" type="button">Prep</button>
      <button class="nav-tab" data-view="itinerary" type="button">Itinerary</button>
      <button class="nav-tab" data-view="transport" type="button">Transport</button>
      <button class="nav-tab" data-view="places" type="button">Places</button>
      <button class="nav-tab" data-view="backup" type="button">Backup Spots</button>
      <button class="nav-tab" data-view="docs" type="button">Docs</button>
      <button class="nav-tab" data-view="checklist" type="button">Checklist</button>
      <button class="nav-tab" data-view="budget" type="button">Budget</button>
      <button class="nav-tab" data-view="settings" type="button">Settings</button>
    </nav>

    <div class="split-pane-container">
      <main id="app" class="app-shell" aria-live="polite"></main>
      <aside id="map-pane" class="map-pane" aria-hidden="true">
        <div id="map-container" class="map-container"></div>
      </aside>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="app-modal" class="modal-shell" aria-hidden="true">
    <div class="modal-backdrop" data-action="close-modal"></div>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <div>
          <p id="modal-kicker" class="tiny">Quick edit</p>
          <h2 id="modal-title" class="section-title">Edit</h2>
        </div>
        <button class="ghost-btn" type="button" data-action="close-modal">ปิด</button>
      </div>
      <form id="modal-form" class="modal-form">
        <input id="modal-type" type="hidden">
        <input id="modal-target-id" type="hidden">

        <label id="modal-name-wrap" class="modal-field">
          <span>ชื่อ</span>
          <input id="modal-name" class="field" type="text" placeholder="ชื่อรายการ">
        </label>

        <label id="modal-region-wrap" class="modal-field">
          <span>Region</span>
          <input id="modal-region" class="field" type="text" placeholder="Osaka / Kyoto / Custom">
        </label>

        <label id="modal-category-wrap" class="modal-field">
          <span>หมวดหมู่</span>
          <input id="modal-category" class="field" type="text" placeholder="custom / food / view">
        </label>

        <label id="modal-time-wrap" class="modal-field">
          <span>ใช้เวลา</span>
          <input id="modal-time" class="field" type="text" placeholder="1-2 ชม.">
        </label>

        <label id="modal-url-wrap" class="modal-field">
          <span>URL</span>
          <input id="modal-url" class="field" type="url" placeholder="https://...">
        </label>

        <label id="modal-text-wrap" class="modal-field">
          <span>รายละเอียด</span>
          <textarea id="modal-text" class="field textarea-field" rows="5" placeholder="เขียนรายละเอียดที่ต้องการ"></textarea>
        </label>

        <div class="modal-actions">
          <button class="secondary-btn" type="button" data-action="close-modal">ยกเลิก</button>
          <button class="primary-btn" type="submit">บันทึก</button>
        </div>
      </form>
    </section>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
